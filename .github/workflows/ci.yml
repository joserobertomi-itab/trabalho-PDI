name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Ruff lint
        run: uv run ruff check pdiseg tests

      - name: Ruff format (check)
        run: uv run ruff format --check pdiseg tests

      - name: Mypy
        run: uv run mypy pdiseg

      - name: Pytest with coverage
        run: uv run pytest --cov=pdiseg --cov-report=term-missing -q

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build pipeline

      - name: Smoke test CLI entrypoints
        run: |
          docker compose run --rm --entrypoint pdiseg pipeline --help
          docker compose run --rm --entrypoint pdiseg-calibrate pipeline --help
          docker compose run --rm --entrypoint pdiseg-review pipeline --help
          docker compose run --rm --entrypoint /usr/local/bin/docker-entrypoint.sh pipeline pdiseg --help

      - name: End-to-end Compose smoke (dataset/ → result/)
        run: bash scripts/docker-smoke.sh
