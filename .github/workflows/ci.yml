name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/joserobertomi-itab/trabalho-pdi

jobs:
  quality:
    name: Lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Agent harness
        run: bash scripts/agent-harness-check.sh

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format (check)
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src/pdiseg

      - name: Pytest with coverage
        run: uv run pytest --cov=pdiseg --cov-report=term-missing -q

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build pipeline

      - name: Smoke test CLI entrypoints
        run: |
          docker compose run --rm --entrypoint pdiseg pipeline --help
          docker compose run --rm --entrypoint pdiseg-calibrate pipeline --help
          docker compose run --rm --entrypoint pdiseg-review pipeline --help
          docker compose run --rm --entrypoint /usr/local/bin/docker-entrypoint.sh pipeline pdiseg --help

      - name: End-to-end Compose smoke (dataset/ → result/)
        run: bash scripts/docker-smoke.sh

      - name: Validate production Compose
        run: docker compose -f docker-compose.prod.yml config

  publish:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    needs: [quality, docker]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/joserobertomi-itab/trabalho-PDI
            org.opencontainers.image.description=Poultry packaging label segmentation pipeline

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
