name: pdiseg

volumes:
  pdiseg-result:
  pdiseg-calibration:

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: pdiseg:latest
    command: ["pdiseg", "/data/input", "/data/output"]
    volumes:
      - ${DATA:-./data/Train_and_Validation}:/data/input:ro
      - ${OUT:-./result}:/data/output
    environment:
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  calibrate:
    profiles: ["tools"]
    image: pdiseg:latest
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - pdiseg-calibrate
      - /data/input
      - /data/calibration
      - --per-class-limit
      - "${LIMIT:-3}"
    volumes:
      - ${DATA:-./data/Train_and_Validation}:/data/input:ro
      - ${CALIB:-./calibration}:/data/calibration
    environment:
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  review:
    profiles: ["tools"]
    image: pdiseg:latest
    build:
      context: .
      dockerfile: Dockerfile
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    command:
      - pdiseg-review
      - --dataset
      - /data/input
      - --calibration
      - /data/calibration
      - --result
      - /data/output
      - --host
      - "0.0.0.0"
      - --port
      - "8765"
    ports:
      - "${PORT:-8765}:8765"
    volumes:
      - ${DATA:-./data/Train_and_Validation}:/data/input:ro
      - ${CALIB:-./calibration}:/data/calibration:ro
      - ${OUT:-./result}:/data/output:ro
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
