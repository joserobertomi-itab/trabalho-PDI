name: pdiseg

x-pdiseg-env: &pdiseg-env
  OMP_NUM_THREADS: "${THREADS:-1}"
  OPENBLAS_NUM_THREADS: "${THREADS:-1}"
  MKL_NUM_THREADS: "${THREADS:-1}"
  NUMEXPR_NUM_THREADS: "${THREADS:-1}"
  VECLIB_MAXIMUM_THREADS: "${THREADS:-1}"
  BLIS_NUM_THREADS: "${THREADS:-1}"
  OPENCV_FOR_THREADS_NUM: "${THREADS:-1}"
  PDISEG_BACKEND: "${PDISEG_BACKEND:-auto}"
  PDISEG_BACKEND_LOG: "${PDISEG_BACKEND_LOG:-1}"
  PDISEG_WORKERS: "${WORKERS:-1}"
  MAX_IMAGES: "${MAX_IMAGES:-}"
  OFFSET: "${OFFSET:-0}"
  PROGRESS_EVERY: "${PROGRESS_EVERY:-25}"
  PDISEG_NICE: "${DOCKER_NICE:-10}"

x-pdiseg-limits: &pdiseg-limits
  cpus: "${DOCKER_CPUS:-2.0}"
  mem_limit: "${DOCKER_MEMORY:-4g}"
  pids_limit: 128

volumes:
  pdiseg-result:
  pdiseg-calibration:

services:
  pipeline:
    <<: *pdiseg-limits
    build:
      context: .
      dockerfile: Dockerfile
    image: pdiseg:latest
    command:
      - sh
      - -c
      - |
        set -- pdiseg /data/input /data/output
        if [ -n "$${MAX_IMAGES:-}" ]; then
          set -- "$$@" --limit "$${MAX_IMAGES}"
        fi
        exec nice -n "$${PDISEG_NICE:-10}" "$$@" --offset "$${OFFSET:-0}" --progress-every "$${PROGRESS_EVERY:-25}" --workers "$${PDISEG_WORKERS:-1}"
    volumes:
      - ${DATA:-./data/Train_and_Validation}:/data/input:ro
      - ${OUT:-./result}:/data/output
    environment:
      <<: *pdiseg-env
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  calibrate:
    <<: *pdiseg-limits
    profiles: ["tools"]
    image: pdiseg:latest
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - sh
      - -c
      - |
        set -- pdiseg-calibrate /data/input /data/calibration --per-class-limit "$${LIMIT:-9999}"
        if [ -n "$${MAX_IMAGES:-}" ]; then
          set -- "$$@" --limit "$${MAX_IMAGES}"
        fi
        exec nice -n "$${PDISEG_NICE:-10}" "$$@" --offset "$${OFFSET:-0}" --progress-every "$${PROGRESS_EVERY:-25}" --workers "$${PDISEG_WORKERS:-1}"
    volumes:
      - ${DATA:-./data/Train_and_Validation}:/data/input:ro
      - ${CALIB:-./calibration}:/data/calibration
    environment:
      <<: *pdiseg-env
      LIMIT: "${LIMIT:-3}"
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  review:
    <<: *pdiseg-limits
    profiles: ["tools"]
    image: pdiseg:latest
    build:
      context: .
      dockerfile: Dockerfile
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    command:
      - pdiseg-review
      - --dataset
      - /data/input
      - --calibration
      - /data/calibration
      - --result
      - /data/output
      - --host
      - "0.0.0.0"
      - --port
      - "8765"
    ports:
      - "${PORT:-8765}:8765"
    volumes:
      - ${DATA:-./data/Train_and_Validation}:/data/input:ro
      - ${CALIB:-./calibration}:/data/calibration:ro
      - ${OUT:-./result}:/data/output:ro
    environment:
      <<: *pdiseg-env
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
