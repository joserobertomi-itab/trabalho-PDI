# pdiseg — production delivery (published GHCR image, no local build)
#
# Prerequisites (run once):
#   mkdir -p result calibration
#   dataset must exist at ./data/Train_and_Validation/
#
# Step 1 — segment full dataset (THIS is the only service started by plain `up`):
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up pipeline
#   # writes crops to ./result/
#
# Step 2 — calibration overlays (run only AFTER pipeline has finished):
#   docker compose -f docker-compose.prod.yml --profile tools run --rm calibrate
#   # writes ./calibration/boxes.json, stats.csv, overlays
#
# Step 3 — review viewer (run only AFTER calibrate has finished):
#   docker compose -f docker-compose.prod.yml --profile tools up review
#   # open http://localhost:8765/
#
# All three steps in order (pipeline → calibrate → review, never in parallel):
#   docker compose -f docker-compose.prod.yml --profile tools up
#
# Chunked run (optional):
#   PDISEG_WORKERS=4 docker compose -f docker-compose.prod.yml up pipeline
#   MAX_IMAGES=100 OFFSET=0 docker compose -f docker-compose.prod.yml up pipeline
#   MAX_IMAGES=100 OFFSET=100 docker compose -f docker-compose.prod.yml up pipeline
#
# Notes:
# - `calibrate` and `review` use profile "tools" — they are NOT started by
#   `docker compose -f docker-compose.prod.yml up` alone (only `pipeline` runs).
# - When using `--profile tools up`, `depends_on` waits for each step to finish
#   before starting the next (no overlap).
# - Image: ghcr.io/joserobertomi-itab/trabalho-pdi:latest

name: pdiseg-prod

x-pdiseg-env: &pdiseg-env
  OMP_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"
  VECLIB_MAXIMUM_THREADS: "1"
  BLIS_NUM_THREADS: "1"
  OPENCV_FOR_THREADS_NUM: "1"
  PDISEG_BACKEND: "auto"
  PDISEG_BACKEND_LOG: "1"
  PDISEG_WORKERS: "6"
  MAX_IMAGES: ""
  OFFSET: "0"
  PROGRESS_EVERY: "25"
  PDISEG_NICE: "10"

x-pdiseg-limits: &pdiseg-limits
  cpus: "6.0"
  mem_limit: "4g"
  pids_limit: 128

x-pdiseg-image: &pdiseg-image
  image: ghcr.io/joserobertomi-itab/trabalho-pdi:latest
  pull_policy: always

services:
  pipeline:
    <<: [*pdiseg-image, *pdiseg-limits]
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -- pdiseg /data/input /data/output
        if [ -n "$${MAX_IMAGES}" ]; then
          set -- "$$@" --limit "$${MAX_IMAGES}"
        fi
        exec nice -n "$${PDISEG_NICE}" "$$@" \
          --offset "$${OFFSET}" \
          --progress-every "$${PROGRESS_EVERY}" \
          --workers "$${PDISEG_WORKERS}"
    volumes:
      - ./data/Train_and_Validation:/data/input:ro
      - ./result:/data/output
    environment:
      <<: *pdiseg-env
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  calibrate:
    <<: [*pdiseg-image, *pdiseg-limits]
    profiles: ["tools"]
    restart: "no"
    depends_on:
      pipeline:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - |
        set -- pdiseg-calibrate /data/input /data/calibration --per-class-limit "9999"
        if [ -n "$${MAX_IMAGES}" ]; then
          set -- "$$@" --limit "$${MAX_IMAGES}"
        fi
        exec nice -n "$${PDISEG_NICE}" "$$@" \
          --offset "$${OFFSET}" \
          --progress-every "$${PROGRESS_EVERY}" \
          --workers "$${PDISEG_WORKERS}"
    volumes:
      - ./data/Train_and_Validation:/data/input:ro
      - ./calibration:/data/calibration
    environment:
      <<: *pdiseg-env
      LIMIT: "9999"
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  review:
    <<: [*pdiseg-image, *pdiseg-limits]
    profiles: ["tools"]
    depends_on:
      calibrate:
        condition: service_completed_successfully
    user: "1000:1000"
    command:
      - pdiseg-review
      - --dataset
      - /data/input
      - --calibration
      - /data/calibration
      - --result
      - /data/output
      - --host
      - "0.0.0.0"
      - --port
      - "8765"
    ports:
      - "8765:8765"
    volumes:
      - ./data/Train_and_Validation:/data/input:ro
      - ./calibration:/data/calibration:ro
      - ./result:/data/output:ro
    environment:
      <<: *pdiseg-env
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
