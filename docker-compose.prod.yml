# pdiseg — production delivery (published GHCR image, no local build)
#
# Prerequisites (run once):
#   mkdir -p result calibration docs/report
#   dataset must exist at ./data/Train_and_Validation/
#   (or set DATA/OUT via env if preferred)
#
# Step 1 — segment full dataset (THIS is the only service started by plain `up`):
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up pipeline
#   # writes crops to ./result/
#
# Step 2 — calibration overlays (AFTER pipeline):
#   docker compose -f docker-compose.prod.yml --profile tools run --rm --no-deps calibrate
#
# Step 3 — T2 recognition (AFTER crops exist):
#   docker compose -f docker-compose.prod.yml --profile tools run --rm --no-deps recognize
#
# Step 4 — T2 PDF reports (AFTER recognition.csv):
#   docker compose -f docker-compose.prod.yml --profile tools run --rm --no-deps report
#
# Step 5 — review viewer (AFTER calibrate; optional):
#   docker compose -f docker-compose.prod.yml --profile review up review
#   # open http://localhost:8765/
#
# Full tools chain in order (pipeline → calibrate → recognize → report):
#   docker compose -f docker-compose.prod.yml --profile tools up
#
# Assignment layout alias:
#   DATA=./dataset OUT=./resultado docker compose -f docker-compose.prod.yml up pipeline
#
# Notes:
# - `calibrate` / `recognize` / `report` use profile "tools"
# - `review` uses profile "review" (standalone read-only UI — issue #8)
# - Plain `up` starts ONLY `pipeline` (issue #7 graded path)
# - Image: ghcr.io/joserobertomi-itab/trabalho-pdi:latest

name: pdiseg-prod

x-pdiseg-env: &pdiseg-env
  OMP_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  MKL_NUM_THREADS: "1"
  NUMEXPR_NUM_THREADS: "1"
  VECLIB_MAXIMUM_THREADS: "1"
  BLIS_NUM_THREADS: "1"
  OPENCV_FOR_THREADS_NUM: "1"
  PDISEG_BACKEND: "auto"
  PDISEG_BACKEND_LOG: "1"
  PDISEG_WORKERS: "6"
  MAX_IMAGES: ""
  OFFSET: "0"
  PROGRESS_EVERY: "25"
  PDISEG_NICE: "10"
  MPLCONFIGDIR: "/tmp/matplotlib"

x-pdiseg-limits: &pdiseg-limits
  cpus: "6.0"
  mem_limit: "4g"
  pids_limit: 128

x-pdiseg-image: &pdiseg-image
  image: ghcr.io/joserobertomi-itab/trabalho-pdi:latest
  pull_policy: always

services:
  pipeline:
    <<: [*pdiseg-image, *pdiseg-limits]
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -- pdiseg /data/input /data/output
        if [ -n "$${MAX_IMAGES}" ]; then
          set -- "$$@" --limit "$${MAX_IMAGES}"
        fi
        exec nice -n "$${PDISEG_NICE}" "$$@" \
          --offset "$${OFFSET}" \
          --progress-every "$${PROGRESS_EVERY}" \
          --workers "$${PDISEG_WORKERS}"
    volumes:
      - ${DATA:-./data/Train_and_Validation}:/data/input:ro
      - ${OUT:-./result}:/data/output
    environment:
      <<: *pdiseg-env
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  calibrate:
    <<: [*pdiseg-image, *pdiseg-limits]
    profiles: ["tools"]
    restart: "no"
    depends_on:
      pipeline:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - |
        set -- pdiseg-calibrate /data/input /data/calibration --per-class-limit "9999"
        if [ -n "$${MAX_IMAGES}" ]; then
          set -- "$$@" --limit "$${MAX_IMAGES}"
        fi
        exec nice -n "$${PDISEG_NICE}" "$$@" \
          --offset "$${OFFSET}" \
          --progress-every "$${PROGRESS_EVERY}" \
          --workers "$${PDISEG_WORKERS}"
    volumes:
      - ${DATA:-./data/Train_and_Validation}:/data/input:ro
      - ${CALIB:-./calibration}:/data/calibration
    environment:
      <<: *pdiseg-env
      LIMIT: "9999"
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  templates:
    <<: [*pdiseg-image, *pdiseg-limits]
    profiles: ["bootstrap"]
    restart: "no"
    command:
      - sh
      - -c
      - |
        exec nice -n "$${PDISEG_NICE}" python /app/scripts/build-templates.py /data/input /data/templates
    volumes:
      - ${DATA:-./data/Train_and_Validation}:/data/input:ro
      - ${TEMPLATES:-./templates}:/data/templates
    environment:
      <<: *pdiseg-env
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  recognize:
    <<: [*pdiseg-image, *pdiseg-limits]
    profiles: ["tools"]
    restart: "no"
    depends_on:
      calibrate:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - |
        set -- pdiseg-recognize /data/output /data/templates \
          --csv /data/output/recognition.csv \
          --sweep-csv /data/calibration/recognition_sweep.csv \
          --progress-every "$${PROGRESS_EVERY}" \
          --workers "$${PDISEG_WORKERS}"
        if [ -n "$${MAX_IMAGES}" ]; then
          set -- "$$@" --limit "$${MAX_IMAGES}"
        fi
        exec nice -n "$${PDISEG_NICE}" "$$@"
    volumes:
      - ${OUT:-./result}:/data/output
      - ${TEMPLATES:-./templates}:/data/templates:ro
      - ${CALIB:-./calibration}:/data/calibration
    environment:
      <<: *pdiseg-env
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

  report:
    <<: [*pdiseg-image, *pdiseg-limits]
    profiles: ["tools"]
    restart: "no"
    depends_on:
      recognize:
        condition: service_completed_successfully
    command:
      - sh
      - -c
      - |
        mkdir -p /data/report \
        && nice -n "$${PDISEG_NICE}" python /app/scripts/build-t2-report.py \
             --templates /data/templates \
             --predictions /data/output/recognition.csv \
             --sweep /data/calibration/recognition_sweep.csv \
             --out /data/report/t2_report.pdf \
        && nice -n "$${PDISEG_NICE}" python /app/scripts/build-t2-simplified.py \
             --templates /data/templates \
             --predictions /data/output/recognition.csv \
             --out /data/report/t2_simplified.pdf \
        && nice -n "$${PDISEG_NICE}" python /app/scripts/build-t2-deliverable.py \
             --templates /data/templates \
             --predictions /data/output/recognition.csv \
             --sweep /data/calibration/recognition_sweep.csv \
             --out /data/report/Relatorio_T2_SIFT.pdf
    volumes:
      - ${OUT:-./result}:/data/output:ro
      - ${TEMPLATES:-./templates}:/data/templates:ro
      - ${CALIB:-./calibration}:/data/calibration:ro
      - ${REPORT:-./docs/report}:/data/report
    environment:
      <<: *pdiseg-env
      PDISEG_PREPARE_MOUNTS: "1"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777

  review:
    <<: [*pdiseg-image, *pdiseg-limits]
    profiles: ["review"]
    user: "1000:1000"
    command:
      - pdiseg-review
      - --dataset
      - /data/input
      - --calibration
      - /data/calibration
      - --result
      - /data/output
      - --host
      - "0.0.0.0"
      - --port
      - "8765"
    ports:
      - "8765:8765"
    volumes:
      - ${DATA:-./data/Train_and_Validation}:/data/input:ro
      - ${CALIB:-./calibration}:/data/calibration:ro
      - ${OUT:-./result}:/data/output:ro
    environment:
      <<: *pdiseg-env
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
